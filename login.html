<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - SmartTA Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen relative overflow-hidden text-slate-800">

    <div class="absolute top-0 left-0 w-full h-80 sm:h-96 bg-blue-600 rounded-b-[100px] sm:rounded-b-[300px] shadow-lg"></div>
    <div class="absolute -top-20 -right-20 w-72 h-72 bg-blue-400 rounded-full blur-3xl opacity-40"></div>
    <div class="absolute top-40 -left-20 w-72 h-72 bg-blue-800 rounded-full blur-3xl opacity-30"></div>

    <div class="relative z-10 w-full max-w-md px-4 sm:px-6">
        
        <div class="bg-white rounded-3xl shadow-2xl border border-slate-100 p-8 sm:p-10 transform transition-all">
            
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 rounded-2xl flex items-center justify-center bg-blue-50 overflow-hidden relative shadow-inner border border-blue-100">
                    <div class="absolute w-full h-full bg-blue-600 rounded-2xl" style="clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0% 100%);"></div>
                    <div class="absolute w-2.5 h-6 bg-yellow-400 bottom-0 left-2.5 rounded-t-sm"></div>
                    <div class="absolute w-2.5 h-8 bg-slate-200 bottom-0 left-7 rounded-t-sm"></div>
                    <div class="absolute w-2.5 h-4 bg-blue-300 bottom-0 left-11.5 rounded-t-sm"></div>
                </div>
            </div>

            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Masuk ke SmartTA</h1>
                <p class="text-sm text-slate-500 mt-2">Sistem Monitoring Tugas Akhir Pintar</p>
            </div>

            <form action="#" method="POST" class="space-y-5">
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">NIM / NIDN / Email</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-400 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <input type="text" placeholder="Masukkan ID pengguna Anda" 
                            class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm text-slate-700">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="block text-sm font-semibold text-slate-700">Kata Sandi</label>
                        <a href="#" class="text-xs font-semibold text-blue-600 hover:text-blue-700 hover:underline transition-colors">Lupa sandi?</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-400 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input type="password" placeholder="••••••••" 
                            class="w-full pl-12 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm text-slate-700">
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-600 cursor-pointer">
                    <label for="remember" class="ml-2 text-sm font-medium text-slate-600 cursor-pointer">Ingat saya di perangkat ini</label>
                </div>

                <button type="submit" class="w-full py-3.5 mt-2 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-md shadow-blue-200 transition-all transform hover:-translate-y-0.5">
                    Masuk ke Dasbor
                </button>
            </form>

            <div class="mt-8 relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-3 bg-white text-slate-400 font-medium">Atau masuk dengan</span>
                </div>
            </div>

            <button type="button" class="mt-6 w-full py-3 flex items-center justify-center gap-3 bg-white border border-slate-200 text-slate-700 font-semibold rounded-xl hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google SSO Kampus
            </button>
            
        </div>
        
        <div class="text-center mt-6">
            <p class="text-sm text-blue-100/80 font-medium">
                Sistem Monitoring Tugas Akhir &copy; 2026
            </p>
            <p class="text-xs text-blue-100/60 mt-1">
                Butuh bantuan? <a href="#" class="underline hover:text-white">Hubungi Admin Prodi</a>
            </p>
        </div>
    </div>

</body>
</html>
